# Render.com deployment configuration
# https://render.com/docs/blueprint-spec
#
# PANYNJ (Port Authority of NY/NJ) Airports Version
# Airports: JFK, LGA, EWR, SWF, TEB

services:
  # Main web application
  - type: web
    name: airport-tracker-panynj
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --chdir backend app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.7"
      - key: DATA_DIR
        value: /tmp/data
      - key: APP_URL
        value: https://airport-tracker-panynj.onrender.com
    plan: free

  # Cron job to check for diagram changes each AIRAC cycle
  # Runs daily at 10:00 UTC - will only send emails when changes are detected
  - type: cron
    name: panynj-diagram-check
    runtime: python
    schedule: "0 10 * * *"  # Daily at 10:00 UTC
    buildCommand: pip install -r requirements.txt
    startCommand: python -m backend.scheduled_check
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.7"
      - key: DATA_DIR
        value: /tmp/data
      - key: APP_URL
        value: https://airport-tracker-panynj.onrender.com
      # Email configuration - set these in the Render dashboard
      - key: GMAIL_ADDRESS
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: ALERT_RECIPIENTS
        sync: false
    plan: free
